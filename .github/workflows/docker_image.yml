name: Build and Push Docker Image

on:
  push:
    branches:
      - main        # triggers on commits to main
  pull_request:
    branches:
      - main        # triggers on PRs targeting main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # only push on commits, not PRs
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/your-image-name:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/your-image-name:${{ github.sha }}
